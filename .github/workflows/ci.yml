name: EchoCoder CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  sentry:
    name: 🛡️ Fork Sentry Guard
    runs-on: ubuntu-latest
    outputs:
      safe_to_run: ${{ steps.gate.outputs.safe_to_run }}
    steps:
    - name: Verify contributor trust and safety
      id: gate
      run: |
        # Check if the PR is from a fork
        IS_FORK=${{ github.event.pull_request.head.repo.full_name != github.repository }}
        
        # Check if the "status: safe-to-test" label is present
        LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
        HAS_LABEL=$(echo $LABELS | grep -c "status: safe-to-test" || true)

        if [ "$IS_FORK" = "true" ] && [ "$HAS_LABEL" = "0" ]; then
          echo "⚠️ Unauthorized Fork detected. This PR requires a 'status: safe-to-test' label from a maintainer."
          echo "safe_to_run=false" >> $GITHUB_OUTPUT
        else
          echo "✅ PR and Contributor verified. Proceeding with Agentic CI."
          echo "safe_to_run=true" >> $GITHUB_OUTPUT
        fi

  build-and-test:
    needs: sentry
    if: needs.sentry.outputs.safe_to_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build

    - name: Run Parser Tests
      run: npm run test:parser

    - name: Run Workflow Tests
      run: npm run test:workflow

    - name: Run Runtime Tests (Mocked)
      run: |
        export OPENCLAUDE_BINARY_PATH="./tests/mocks/agent.sh"
        chmod +x ./tests/mocks/agent.sh
        npm run test:runtime

    - name: Run Property-Based Tests
      run: npm run test:property

    - name: Run Mutation Tests (Draft)
      run: npm run test:mutation
      continue-on-error: true # Mutation tests are intensive, don't fail initially

    - name: Pipeline Doctor (Self-Healing Interceptor)
      if: failure()
      run: |
        echo "Build failed. Triggering Agent Doctor..."
        # Extract logs for the doctor to analyze (simplified for demonstration)
        export GITHUB_STEP_SUMMARY="./failed_logs.txt"
        npx ts-node scripts/agent-doctor.ts
