name: Autonomous PR Risk Classifier

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    name: Autonomous Labeling
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Need full history to get diff

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x

    - name: Fetch PR Diff
      run: |
        gh pr diff ${{ github.event.pull_request.number }} > pr_diff.txt
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run Scaling Agent Triad (Area, Trust, ATC)
      run: |
        echo "📡 Orchestrating scaling agents for PR #${{ github.event.pull_request.number }}..."
        
        # 🏷️ Area Triager: Categorize PR by code area
        npx ts-node scripts/area_triager.ts
        
        # 👤 Trust Checker: Check contributor reputation
        npx ts-node scripts/trust_checker.ts ${{ github.event.pull_request.user.login }}
        
        # ✍️ Scribe: Check for documentation parity
        npx ts-node scripts/doc_sync_agent.ts
        
        # 💰 Accountant: Optimize test execution costs
        npx ts-node scripts/cost_optimizer.ts
        
        # 📡 ATC: Check for merge conflicts
        npx ts-node scripts/conflict_atc.ts
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_AUTHOR: ${{ github.event.pull_request.user.login }}
