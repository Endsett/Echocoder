name: Autonomous PR Risk Classifier

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    name: Autonomous Labeling
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Need full history to get diff

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x

    - name: Fetch PR Diff
      run: |
        gh pr diff ${{ github.event.pull_request.number }} > pr_diff.txt
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run Risk Classifier and Auto-Approve
      run: npx ts-node scripts/risk_classifier.ts pr_diff.txt
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
