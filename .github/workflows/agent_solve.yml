name: Autonomous Issue Solver

on:
  issues:
    types: [labeled]

jobs:
  solve-issue:
    if: github.event.label.name == 'status: agent-solve'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Preflight Triage & Reputation Check
      id: preflight
      run: |
        npx ts-node scripts/trust_checker.ts ${{ github.actor }}
        # Simple issue labeling can happen here if needed

    - name: Run Dagger-Isolated Issue Solver
      run: |
        npx dagger run ts-node scripts/issue_solver_agent.ts
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        PR_AUTHOR: ${{ github.actor }}
